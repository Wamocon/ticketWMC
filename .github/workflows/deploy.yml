name: Vercel Deploy

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment to deploy'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      ref:
        description: 'Branch or tag to deploy (optional). For production provide tag.'
        required: false
        default: ''

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_NAME: ${{ github.event.repository.name }}

jobs:
  cancel_push_if_pr:
    name: Cancel push run if there is an open PR for the branch
    runs-on: ubuntu-latest
    steps:
      - name: Check for open PR and cancel
        uses: actions/github-script@v6
        with:
          script: |
            if (context.eventName !== 'push') {
              core.info(`Not a push event (${context.eventName}); nothing to cancel.`);
              return;
            }
            const branch = context.ref.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (prs.data && prs.data.length > 0) {
              core.info(`Open PR exists for ${branch}, cancelling this push run in favor of the pull_request event`);
              await github.rest.actions.cancelWorkflowRun({ owner: context.repo.owner, repo: context.repo.repo, run_id: parseInt(process.env.GITHUB_RUN_ID) });
            } else {
              core.info('No open PR found; continuing with push run');
            }

  preview-deploy:
    name: Vercel Preview Deployment
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}

      - name: Decide preview deployment
        id: decide_preview
        uses: actions/github-script@v6
        with:
          script: |
            const eventName = context.eventName;
            let runPreview = 'false';
            if (eventName === 'workflow_dispatch') {
              const env = github.context.payload.inputs && github.context.payload.inputs.environment;
              runPreview = env === 'preview' ? 'true' : 'false';
            } else if (eventName === 'pull_request') {
              runPreview = 'true';
            } else if (eventName === 'push') {
              const branch = context.ref.replace('refs/heads/', '');
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open'
              });
              runPreview = prs.data && prs.data.length > 0 ? 'false' : 'true';
            }
            core.info(`Preview run: ${runPreview}`);
            core.setOutput('run_preview', runPreview);

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel@28 || true

      - name: Deploy to Vercel (Preview)
        if: steps.decide_preview.outputs.run_preview == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          VERCEL_PROJECT_NAME="${VERCEL_PROJECT_NAME,,}"
          echo "Deploying preview for $VERCEL_PROJECT_NAME"
          if [ -n "$VERCEL_TEAM_ID" ]; then
            SCOPE=(--scope "$VERCEL_TEAM_ID")
          else
            SCOPE=()
          fi
          npx vercel --token "$VERCEL_TOKEN" --yes --name "$VERCEL_PROJECT_NAME" "${SCOPE[@]}"

  production-deploy:
    name: Vercel Production Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel@28 || true

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          VERCEL_PROJECT_NAME="${VERCEL_PROJECT_NAME,,}"
          echo "Deploying production for $VERCEL_PROJECT_NAME (release ${{ github.event.release.tag_name }})"
          if [ -n "$VERCEL_TEAM_ID" ]; then
            SCOPE=(--scope "$VERCEL_TEAM_ID")
          else
            SCOPE=()
          fi
          npx vercel --token "$VERCEL_TOKEN" --yes --prod --name "$VERCEL_PROJECT_NAME" "${SCOPE[@]}"
